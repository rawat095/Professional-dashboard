<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Documentation</title>

    <script src=" https://cdn.jsdelivr.net/npm/axios@1.18.1/dist/axios.min.js "></script>
    <script>
        function api() {

            axios.get("https://api.rootnet.in/covid19-in/stats/latest")
                .then(res => {
                    console.log(res.data.data.summary);
                    console.log(res.data.data.confirmedCasesIndian);
                    console.log(res.data.data.deaths);
                    console.log(res.data.data.discharged);
                });
        }
    </script>

</head>

<body onload="api()">

</body>

</html>
