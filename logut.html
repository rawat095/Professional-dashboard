<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Logout Popup</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <script src="logout.js"></script>

    <style>
        /* Popup Animation */
        .modal.fade .modal-dialog {
            transform: scale(0.8);
            opacity: 0;
            transition: all 0.3s ease-in-out;
        }

        .modal.show .modal-dialog {
            transform: scale(1);
            opacity: 1;
        }

        /* Professional button hover */
        .btn-danger:hover {
            transform: translateY(-2px);
            transition: 0.2s;
        }

        .logout-icon {
            width: 90px;
            height: 90px;
            background: rgba(220,53,69,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: auto;
        }
    </style>

    <script>

        function logout() {
            // Clear user session or authentication data
            localStorage.removeItem("eml");
            localStorage.removeItem("pwd");

            // Redirect to login page
            window.location.href = "login.html";
        }
    </script>
</head>

<body class="bg-light" >

<div class="container py-5 text-center">

    <h2 class="mb-4">Professional Dashboard</h2>

    <!-- Logout Button -->
    <button class="btn btn-danger btn-lg px-4"
            data-bs-toggle="modal"
            data-bs-target="#logoutModal" onclick="logout()">
        <i class="bi bi-box-arrow-right me-2"></i>
        Logout
    </button>

</div>

<!-- Logout Modal -->
<div class="modal fade" id="logoutModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">

        <div class="modal-content border-0 shadow-lg rounded-4">

            <div class="modal-body text-center p-5">

                <div class="logout-icon mb-4">
                    <i class="bi bi-box-arrow-right text-danger display-4"></i>
                </div>

                <h3 class="fw-bold">Confirm Logout</h3>

                <p class="text-muted mt-3">
                    Are you sure you want to logout from your account?
                </p>

                <div class="d-grid gap-2 mt-4">

                    <button class="btn btn-danger btn-lg" onclick="logout()">
                        <i class="bi bi-box-arrow-right me-2"></i>
                        Logout
                    </button>

                    <button class="btn btn-outline-secondary btn-lg"
                            data-bs-dismiss="modal">
                        <i class="bi bi-x-circle me-2"></i>
                        Cancel
                    </button>

                </div>

            </div>

        </div>

    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
