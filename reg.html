<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Registration Form</title>

    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0d6efd, #6f42c1);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            border: none;
            border-radius: 18px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, .2);
        }

        .card-header {
            background: #0d6efd;
            color: #fff;
            border-radius: 18px 18px 0 0 !important;
        }

        .form-control,
        .form-select {
            height: 48px;
            border-radius: 10px;
        }

        .btn-register {
            height: 48px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
        }

        h3 {
            font-weight: bold;
        }
    </style>
    <script>
        function reg() {
            let nm = document.getElementById("nm").value;
            let eml = document.getElementById("eml").value;
            let mob = document.getElementById("mob").value;
            let pw = document.getElementById("pwd").value;
            let ct = document.getElementById("ct").value;
            let gn = document.getElementById("gen").value;
            // console.log( " + nm" + ",  " + eml + " " + mob + " " + pw + " " + ct + " " + gn);
            alert("reg");

            localStorage.setItem("nm", nm);
            localStorage.setItem("eml", eml);
            localStorage.setItem("mob", mob);
            localStorage.setItem("pwd", pw);
            localStorage.setItem("ct", ct);
            localStorage.setItem("gen", gn);

            window.location.href = "login.html";

        }
    </script>
</head>

<body>
<!-- JSON 
    JavaScript Object Notation (JSON) is a lightweight data-interchange format that is easy for humans to read and write, and easy for machines to parse and generate. It is often used to transmit data between a server and a web application as text. JSON is built on two structures: a collection of name/value pairs (often realized as an object, record, struct, dictionary, hash table, keyed list, or associative array) and an ordered list of values (often realized as an array, vector, list, or sequence).
-->
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8 col-sm-10">

                <div class="card">

                    <div class="card-header text-center py-3">
                        <h3>Registration Form</h3>
                    </div>

                    <div class="card-body p-4">

                            <!-- Name -->
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Full Name</label>
                                <input type="text" id="nm" class="form-control" placeholder="Enter your full name">
                            </div>

                            <!-- Email -->
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Email Address</label>
                                <input type="email"  id="eml" class="form-control" placeholder="Enter your email">
                            </div>

                            <!-- Mobile -->
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Mobile Number</label>
                                <input type="tel" id="mob" class="form-control" placeholder="Enter mobile number">
                            </div>

                            <!-- Password -->
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Password</label>
                                <input type="password" id="pwd" class="form-control" placeholder="Enter password">
                            </div>

                            <!-- City -->
                            <div class="mb-3">
                                <label class="form-label fw-semibold">City</label>
                                <select class="form-select" id="ct">
                                    <option selected>Select City</option>
                                    <option value="Jodhpur">Jodhpur</option>
                                    <option value="Bhopal">Bhopal</option>
                                    <option value="Kanpur">Kanpur</option>
                                    <option value="Indore">Indore</option>
                                    <option value="Raipur">Raipur</option>
                                    <option value="Delhi">Delhi</option>
                                    <option value="Mumbai">Mumbai</option>
                                </select>
                            </div>

                            <!-- Gender -->
                            <div class="mb-4">
                                <label class="form-label fw-semibold d-block">Gender</label>

                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender" value="M" id="gen">
                                    <label class="form-check-label">Male</label>
                                </div>

                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender" id="gen" value="F">
                                    <label class="form-check-label">Female</label>
                                </div>

                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender" value="O" id="gen">
                                    <label class="form-check-label">Other</label>
                                </div>

                            </div>

                            <!-- Button -->
                            <div class="d-grid">
                                <button type="button" onclick="reg()" class="btn btn-primary btn-register">
                                    Register
                                </button>
                                <a href="login.html">Already have an account? Sign in</a>
                            </div>       

                    </div>

                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap 5.3 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
