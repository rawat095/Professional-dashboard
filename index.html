<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>

    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
        function index() {
            let eml = document.getElementById("eml").value; 
            let pw = document.getElementById("pwd").value;

            let lml = localStorage.getItem("eml");
            let lpw = localStorage.getItem("pwd");

            if (eml == lml && pw == lpw){
                alert("Login Successful....!!");
                window.location.href = "dash.html"; 
                
            } else {
                window.location.href = "dash.html"; 
                alert("Login Failed....!!");
            }

        }
    </script>

    <style>
        body {
            background: linear-gradient(135deg, #0d6efd, #6f42c1);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            border: none;
            border-radius: 18px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, .2);
        }

        .card-header {
            background: #0d6efd;
            color: #fff;
            border-radius: 18px 18px 0 0 !important;
        }

        .form-control,
        .form-select {
            height: 48px;
            border-radius: 10px;
        }

        .btn-register {
            height: 48px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
        }

        h3 {
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8 col-sm-10">

                <div class="card">

                    <div class="card-header text-center py-3">
                        <h3>Login</h3>
                    </div>

                    <div class="card-body p-4">

                        <!-- Email -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Email Address</label>
                            <input type="email" id="eml" class="form-control" placeholder="Enter your email">
                        </div>

                        <!-- Password -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Password</label>
                            <input type="password" id="pwd" class="form-control" placeholder="Enter password">
                        </div>

                        <!-- Button -->
                        <div class="d-grid">
                            <button type="submit" onclick="index()" class="btn btn-primary btn-lg">
                                Login
                            </button>
                            <a href="reg.html">New User? Sign up</a>
                        </div>
                    </div>

                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap 5.3 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
